<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#4a7c2f" />
  <title>Triple Town</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Triple Town" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <header id="hud">
      <div class="stat">
        <span class="stat-label">Score</span>
        <span id="score" class="stat-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Best</span>
        <span id="best" class="stat-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Coins</span>
        <span id="coins" class="stat-value">0</span>
      </div>
    </header>

    <section id="toolbar">
      <span id="version" class="version" title="build version"></span>
      <span class="hint">Tap to place · corner = store</span>
      <div id="new-controls">
        <span class="new-label">New</span>
        <button class="size-btn" data-size="6" title="New 6×6 game">6×6</button>
        <button class="size-btn" data-size="7" title="New 7×7 game">7×7</button>
        <button class="size-btn" data-size="8" title="New 8×8 game">8×8</button>
      </div>
    </section>

    <main id="board-wrap">
      <div id="board" role="grid" aria-label="game board"></div>
    </main>

    <section id="store">
      <span class="store-label">Store</span>
      <div id="store-items"></div>
    </section>

    <div id="gameover" class="overlay">
      <div class="overlay-card">
        <h1>Game Over</h1>
        <p>Final score</p>
        <p id="final-score" class="final">0</p>
        <div class="again-row">
          <button class="size-btn primary" data-size="6">New 6×6</button>
          <button class="size-btn primary" data-size="7">New 7×7</button>
          <button class="size-btn primary" data-size="8">New 8×8</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
